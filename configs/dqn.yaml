env:
  env_id: "LunarLander-v3"
  render_mode: null
  seed: 42

agent:
  hidden_dims: [128, 128]
  buffer_capacity: 50000
  learning_rate: 0.001
  gamma: 0.99
  batch_size: 64
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.995
  target_update_freq: 200
  device: "cuda"

trainer:
  num_episodes: 300
  max_steps_per_episode: 1000
  warmup_steps: 1000
  save_every: 10

paths:
  checkpoint_dir: "outputs/checkpoints"
  video_dir: "outputs/videos"