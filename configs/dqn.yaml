env:
  env_id: "LunarLander-v3"
  render_mode: null
  seed: 42

agent:
  state_dim: null
  action_dim: null
  hidden_dims: [128, 128]
  buffer_capacity: 100000
  learning_rate: 0.001
  gamma: 0.99
  batch_size: 64
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.995
  target_update_freq: 100
  device: "cpu"

trainer:
  num_episodes: 500
  max_steps_per_episode: 1000
  warmup_steps: 1000
  save_every: 50

paths:
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  video_dir: "outputs/videos"